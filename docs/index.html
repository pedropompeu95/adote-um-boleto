<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adote um Boleto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #aaa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #fff; font-size: 28px; font-weight: bold; margin-bottom: 8px; }
    p { color: #888; font-size: 15px; max-width: 480px; line-height: 1.6; margin-bottom: 32px; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    a {
      color: #fff; background: #e94560;
      padding: 12px 24px; border-radius: 10px;
      text-decoration: none; font-weight: bold; font-size: 14px;
    }
    a.secundario {
      background: transparent; color: #e94560;
      border: 1px solid #e94560;
    }
    a:hover { opacity: 0.85; }
    footer { position: fixed; bottom: 16px; color: #333; font-size: 12px; }
  </style>
</head>
<body>
  <div class="emoji">💙</div>
  <h1>Adote um Boleto</h1>
  <p>Uma plataforma de solidariedade onde qualquer pessoa pode pedir ajuda para pagar suas contas básicas — e qualquer um pode contribuir com o que puder.</p>
  <div class="links">
    <a href="privacidade.html">Política de Privacidade</a>
    <a href="termos.html" class="secundario">Termos de Uso</a>
  </div>
  <footer>© 2026 Adote um Boleto</footer>
</body>
</html>
